name: Deploy RAG System

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      # Checkout GitHub repo
      - name: Checkout Repository
        uses: actions/checkout@v4


      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      # Install Databricks CLI
      - name: Install Databricks CLI
        run: |
          pip install databricks-cli


      # Configure Databricks
      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks clusters list


      # Trigger Databricks Ingestion Job
      - name: Trigger Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks jobs run-now --job-id ${{ secrets.JOB_ID }}


      # -----------------------------
      # Docker Build Section
      # -----------------------------

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rag-chatbot:latest .


      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rag-chatbot:latest
